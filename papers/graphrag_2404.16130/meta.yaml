year: 2024
url: https://arxiv.org/abs/2404.16130
pdf: paper.pdf

status: implemented
implementation_module: rag.techniques.graphrag
implementation_path: src/rag/techniques/graphrag/
config: configs/pipelines/graphrag.yaml

key_ideas:
  - "Two-stage indexing: (1) LLM extracts entities + relations from chunks, (2) LLM summarizes each community of the resulting graph."
  - "Hierarchical Leiden community detection — different levels = different abstraction granularity."
  - "Global query = map-reduce over community summaries (good for sense-making questions)."
  - "Local query = entity-anchored neighborhood + supporting chunks (good for factoid questions)."

phase1_simplifications:
  - "Local-search entity matching uses substring/token heuristic, not a dedicated entity vector index."
  - "Community ranking uses LLM self-rated helpfulness (0-100), not a separately trained scorer."

phase2_completed:
  - "Gleaning loop (§2.2): extract_with_gleaning runs the extractor up to N passes per chunk, prompting the LLM to surface only entities/relations it missed previously. Enabled via `--gleaning-passes` on `task build-graph`."

phase2_followups:
  - "Build a dedicated entity vector index (separate Qdrant collection) for robust local-search anchoring."
  - "Persist graph to Neo4j for browser-based exploration."
  - "Per-level community evaluation — measure when global vs local is preferable."
